name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  flatpak:
    name: GNOME 50 Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build, test, and validate Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: soundsgood.flatpak
          manifest-path: io.github.n1ghthill.soundsgood.yml
          run-tests: true
          cache-key: flatpak-builder-${{ github.sha }}
          artifact-name: soundsgood-${{ github.sha }}.flatpak
